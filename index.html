<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Breader Reviews</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container {
            position: relative;
            text-align: center;
            color: white;
        }
        .centered {
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            font-size: 48px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="background.jpg" alt="Background" style="width:100%;height:auto;">
        <div class="centered">Breader Reviews</div>
    </div>
</body>
</html>
